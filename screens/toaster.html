<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Toaster</title>
    <style>
        :root {
            --am-d-primary: #F15E74;
            --am-d-secondary: #2C3E50;
            --am-d-accent: #2563eb;
            --am-d-bg: #FAFAFA;
            --am-d-text: #000000;
            --am-d-success: #16a34a;
            --am-d-warning: #f59e0b;
            --am-d-error: #ea0124;
            --am-d-white: #ffffff;
            --am-d-card-shadow: 0 12px 30px rgba(0, 0, 0, 0.05);
            --am-d-border-light: #e9eef3;
            --am-d-border-default: #e2e8f0;
            --am-d-grey-light-text: #5a6e7c;
            --am-d-light-yellow-bg: #fff2dc;
            --am-d-light-red-bg: #ffe6ea;
            --am-d-light-green-bg: #d5ffe5;
        }

        /* Toaster Styles */
        .am-toaster {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background-color: var(--am-d-white);
            border: 1px solid var(--am-d-border-default);
            border-left: 4px solid var(--am-d-primary);
            border-radius: 8px;
            box-shadow: var(--am-d-card-shadow);
            padding: 16px 40px 16px 16px;
            min-width: 300px;
            max-width: 400px;
            z-index: 9999;
            animation: amFadeInDown 0.3s ease-out;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        /* Responsive: ≤ 400px */
        @media (max-width: 400px) {
            .am-toaster {
                min-width: 200px;
                max-width: 230px;
            }
        }

        /* Responsive: > 400px */
        @media (min-width: 401px) {
            .am-toaster {
                min-width: 300px;
                max-width: 400px;
            }
        }

        @keyframes amFadeInDown {
            from {
                transform: translateX(-50%) translateY(-20px);
                opacity: 0;
            }
            to {
                transform: translateX(-50%) translateY(0);
                opacity: 1;
            }
        }

        @keyframes amFadeOutUp {
            from {
                transform: translateX(-50%) translateY(0);
                opacity: 1;
            }
            to {
                transform: translateX(-50%) translateY(-20px);
                opacity: 0;
            }
        }

        .am-toaster.am-hiding {
            animation: amFadeOutUp 0.3s ease-out forwards;
        }

        .am-toaster-message {
            color: var(--am-d-grey-light-text);
            font-size: 13px;
            line-height: 1.4;
        }

        .am-toaster-close {
            position: absolute;
            top: 8px;
            right: 8px;
            background: none;
            border: none;
            cursor: pointer;
            padding: 4px;
            color: var(--am-d-grey-light-text);
            font-size: 18px;
            line-height: 1;
            transition: color 0.2s;
        }

        .am-toaster-close:hover {
            color: var(--am-d-primary);
        }
    </style>
</head>
<body>
    <!-- Toaster Container -->
    <div id="am-toaster" class="am-toaster" style="display: none;">
        <div class="am-toaster-message" id="am-toaster-message">Operation completed successfully!</div>
        <button class="am-toaster-close" onclick="amCloseToaster()" aria-label="Close">&times;</button>
    </div>

    <script>
        let amToasterTimeout;

        function amShowToaster(message) {
            const amToaster = document.getElementById('am-toaster');
            const amToasterMessage = document.getElementById('am-toaster-message');

            amToasterMessage.textContent = message;
            
            amToaster.style.display = 'block';
            amToaster.classList.remove('am-hiding');

            // Clear any existing timeout
            if (amToasterTimeout) {
                clearTimeout(amToasterTimeout);
            }

            // Auto hide after 5 seconds
            amToasterTimeout = setTimeout(function() {
                amCloseToaster();
            }, 5000);
        }

        function amCloseToaster() {
            const amToaster = document.getElementById('am-toaster');
            amToaster.classList.add('am-hiding');
            
            setTimeout(function() {
                amToaster.style.display = 'none';
                amToaster.classList.remove('am-hiding');
            }, 300);
        }

        // Demo: Show toaster on page load
        window.onload = function() {
            setTimeout(function() {
                amShowToaster('You have successfully logged in!');
            }, 500);
        };
    </script>
</body>
</html>
